version: "3"
services:
  ircd:
    image: inspircd/inspircd-docker:3
    ports:
      - "6667:6667"
      - "6697:6697"
    volumes:
      - ./inspircd.conf:/inspircd/conf/inspircd.conf
      - ./data:/inspircd/data
    environment:
      - INSPIRCD_CONFIG=/inspircd/conf/inspircd.conf
    restart: unless-stopped
